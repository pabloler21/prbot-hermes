# Configuración de Hermes Agent — Fase 1.
# Objetivo de esta fase: gateway vivo por Discord, SIN acciones sobre GitHub todavía.
#
# Este archivo se copia al VPS como ~/.hermes/config.yaml.
# Los SECRETS no van acá: se referencian por nombre desde ~/.hermes/.env
# (ver deploy/.env.example y deploy/install-notes.md).
#
# IMPORTANTE (ver ADR-0002): los NOMBRES de campos de abajo siguen los conceptos
# documentados de Hermes, pero deben validarse contra el config.yaml que genera el
# instalador y la doc oficial (https://hermes-agent.nousresearch.com/docs).
# Si algún nombre difiere, ajustarlo y dejar constancia en el ADR.

# --- Proveedor de LLM ---
# Proveedor: OpenCode (suscripción Go del usuario). Confirmado en Fase 1, ADR-0002.
# El instalador de Hermes soporta OpenCode nativamente; la API key se carga desde el .env.
llm:
  provider: opencode
  model: kimi-k2.7-code
  api_key_env: OPENCODE_API_KEY

# --- Canales de entrada ---
channels:
  discord:
    enabled: true
    # Token del bot, tomado del entorno.
    token_env: DISCORD_BOT_TOKEN
    # Allowlist explícita de usuarios autorizados (IDs separados por coma en el .env).
    # Sin allowlist, Hermes deniega a todos. Sin allow-all.
    allowed_users_env: DISCORD_ALLOWED_USERS

# --- Aprobaciones (postura segura por defecto, fail-closed) ---
approvals:
  # manual = todo comando de shell PELIGROSO requiere aprobación yes/no por Discord.
  mode: manual
  # En ejecuciones por cron, denegar por defecto en modo headless.
  cron_mode: deny

# --- Sandbox de ejecución ---
sandbox:
  # Backend ssh/host (decisión de Fase 1, ADR-0002).
  # Reevaluar 'docker' antes de habilitar acciones sobre GitHub (Fase 3).
  backend: ssh

# --- Terminal ---
terminal:
  # Directorio de trabajo del agente. NO un directorio sensible.
  # Debe existir y ser propiedad del usuario 'hermes' (ver install-notes.md).
  cwd: /home/hermes/work

# --- MCP servers ---
# RECONCILIADO en Fase 3 (ver ADR-0004): Hermes NO declara los MCP en un bloque
# 'mcp_servers' de este YAML. Se gestionan con el CLI `hermes mcp` y se guardan
# en el estado interno de Hermes. El comando que dejamos versionado en
# deploy/install-notes.md (paso de Fase 3) es:
#
#   hermes mcp add github --command npx \
#     --env GITHUB_PERSONAL_ACCESS_TOKEN='${GITHUB_PAT}' \
#     --args -y @modelcontextprotocol/server-github
#
# - El PAT NO se hardcodea: se guarda la referencia literal ${GITHUB_PAT} y
#   Hermes la resuelve en runtime desde ~/.hermes/.env.
# - GUARDRAIL: el MCP se deja en SOLO-LECTURA con `hermes mcp configure github`
#   (14 tools de lectura; las 12 de escritura desactivadas). El único camino
#   para publicar en GitHub es el worker de BullMQ con approval gate (Fase 3b).
